<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجتمع منتصر</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            text-align: center;
            overflow-x: hidden;
        }

        /* الستار الأول */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #welcome-screen h1 {
            font-size: 2.8rem;
            color: #66fcf1;
            margin-bottom: 25px;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #0b0c10;
            background-color: #66fcf1;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.4);
        }

        /* الواجهة الثانية */
        #main-content {
            display: none;
            padding: 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .top-title {
            font-size: 3.2rem;
            color: #ff0055;
            margin-top: 30px;
        }

        .audio-container {
            background: rgba(31, 40, 51, 0.9);
            border: 2px solid #ff0055;
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            margin: 40px auto;
        }

        .audio-container p {
            margin-top: 0;
            color: #c5a059;
            font-weight: bold;
        }

        audio {
            width: 100%;
        }

        .sub-title {
            font-size: 2.3rem;
            color: #45f3e7;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- واجهة الدخول الأولى -->
    <div id="welcome-screen">
        <h1>انضم إلي مجتمع منتصر</h1>
        <button class="start-btn" onclick="bypassAndPlay()">استارت</button>
    </div>

    <!-- الموقع الثاني -->
    <div id="main-content">
        <h1 class="top-title">سفاح الاندر ايدج</h1>
        
        <div class="audio-container">
            <p>🎵 مشغل الآن: العدل فوق الجميع</p>
            <!-- الاعتماد على مسار محلي لتخطي الـ CORS وسياسات الحجب للروابط الخارجية -->
            <audio id="target-audio" controls loop>
                <source src="audio.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <h2 class="sub-title">سفاح مدرسة علاء الدين</h2>
    </div>

    <script>
        function bypassAndPlay() {
            var audio = document.getElementById("target-audio");
            
            // التشغيل يتم عبر الـ Interaction Event مباشرة لتجاوز الـ Autoplay Restriction
            audio.play().then(() => {
                console.log("Audio payload executed successfully.");
            }).catch((err) => {
                console.error("Playback prevented: ", err);
            });

            // إخفاء الواجهة الأولى وإظهار المحتوى فوراً
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }
    </script>
</body>
</html>
