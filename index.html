<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمي وأبي .. أغلى ما أملك ❤️</title>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {

            overflow: hidden;

            position: relative;

        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 10;
            animation: fadeIn 2s ease-in-out;
        }
        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 65, 108, 0.8);
            font-weight: bold;
        }
        .subtitle {
            font-size: 1.3rem;
            color: #ffb3d1;
            margin-top: -15px;
            font-style: italic;
        }
        .start-btn {

            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 75, 43, 0.6);
            transition: all 0.3s ease;
        }
        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(255, 65, 108, 0.9);
            letter-spacing: 1px;
        }

            align-items: center;
            gap: 20px;
            max-width: 480px;
            width: 90%;
            z-index: 10;
        }
