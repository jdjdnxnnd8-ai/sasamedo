<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمي وأبي .. أغلى ما أملك ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            padding: 20px; 
            text-align: center; 
            overflow-x: hidden; 
            position: relative;
            
            /* صورتك في الخلفية من ورا بكود مضمون ومباشر */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('1000136325.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #1a0010; 
        }

        .audio-controls {
            position: fixed; top: 20px; z-index: 100; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px); padding: 8px 20px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3); display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .control-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b); border: none; color: white;
            padding: 6px 15px; font-size: 0.9rem; font-weight: bold; border-radius: 20px; cursor: pointer;
        }
        .pause-btn { background: #555; }
        .status-text { font-size: 0.85rem; color: #fff; font-weight: bold; }
        
        .main-container {
            max-width: 450px; width: 100%; z-index: 10; background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px); padding: 35px 25px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8); margin-top: 60px;
        }
        h1 { font-size: 2.2rem; color: #fff; text-shadow: 0 0 15px rgba(255, 65, 108, 0.7); margin-bottom: 25px; }
        
        .timer-title {
            font-size: 1.1rem; color: #fff; margin-bottom: 12px; font-weight: bold;
        }
        .timer-container {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-bottom: 25px; direction: ltr;
        }
        .timer-box {
            background: rgba(255, 65, 108, 0.35); border: 1px solid rgba(255, 154, 158, 0.5);
            padding: 8px 4px; border-radius: 12px; min-width: 60px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .timer-num {
            font-size: 1.3rem; font-weight: bold; color: #fff; text-shadow: 0 0 8px #ff416c;
        }
        .timer-label {
            font-size: 0.75rem; color: #ffb3d1; margin-top: 2px; font-weight: bold;
        }

        .text-love { font-size: 1.8rem; color: #ff9a9e; margin-bottom: 12px; font-weight: bold; }
        .desc { font-size: 1.1rem; color: #e0e0e0; line-height: 1.6; }
        .heart { position: absolute; animation: moveUp 5s linear infinite; bottom: -10%; opacity: 0.5; z-index: 1; pointer-events: none; }
        @keyframes moveUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="audio-player" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop preload="auto"></audio>

    <div class="audio-controls">
        <span class="status-text" id="music-status">اضغط تشغيل للأغنية 🎵</span>
        <button class="control-btn" onclick="manualPlay()">▶ تشغيل</button>
        <button class="control-btn pause-btn" onclick="manualPause()">⏸ إيقاف</button>
    </div>

    <div class="main-container">
        <h1>أمي وأبي أغلى ما ليا ❤️</h1>

        <div class="timer-title">كل ثانية وأنتم جنتي في الدنيا منذ:</div>
        <div class="timer-container">
            <div class="timer-box"><div class="timer-num" id="seconds">00</div><div class="timer-label">ثانية</div></div>
            <div class="timer-box"><div class="timer-num" id="minutes">00</div><div class="timer-label">
