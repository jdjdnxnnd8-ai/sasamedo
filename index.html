<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أغلى ما أملك ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0010, #3a0020, #2a0018);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow-x: hidden;
        }
        .main-container {
            max-width: 450px;
            width: 100%;
            z-index: 10;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 30px;
            border: 2px solid rgba(255, 192, 203, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 65, 108, 0.7);
            margin-bottom: 20px;
        }
        .img-box {
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            background: #222;
        }
        .img-box img {
            width: 100%;
            height: auto;
            display: block;
        }
        .music-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .music-btn:active {
            transform: scale(0.95);
        }
        .text-love {
            font-size: 1.8rem;
            color: #ff9a9e;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .desc {
            font-size: 1.05rem;
            color: #e0e0e0;
            line-height: 1.6;
        }
        /* تأثير القلوب */
        .heart {
            position: absolute;
            animation: moveUp 5s linear infinite;
            bottom: -10%;
            opacity: 0.6;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }
        @keyframes moveUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- الأغنية المباشرة -->
    <audio id="audio-player" src="https://archive.org/download/omy-ganna-sultan/omy-ganna.mp3" loop></audio>

    <div class="main-container">
        <h1>أمي وأبي أغلى ما ليا ❤️</h1>
        
        <!-- زر لتشغيل الأغنية مباشرة وتجنب قيود المتصفح -->
        <button class="music-btn" onclick="playMusic()">🎵 تشغيل أغنية أمي جنة 🎵</button>

        <div class="img-box">
            <!-- استدعاء الصورة المباشرة بحروف صغيرة كاملاً للامتثال للملف المرفوع -->
            <img src="1000093292.jpg" alt="أمي وأبي الغاليين">
        </div>

        <h2 class="text-love">ربنا يخليكم ليا ❤️</h2>
        <p class="desc">لو جمعت كلمات الشكر والامتنان من كل العالم، لن توفي حقكم يا جنتي في الدنيا. حفظكم الله لي وأدام ضحكتكم تنير حياتي.</p>
    </div>

    <script>
        // تشغيل الموسيقى عند ضغط الزر الصريح لضمان كسر حماية المتصفح
        function playMusic() {
            const audio = document.getElementById('audio-player');
            audio.play().catch(e => alert("اضغط مرة أخرى للتشغيل"));
        }

        // إنشاء تأثير القلوب الصاعدة تلقائياً عند فتح الصفحة
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                const types = ['❤️', '💖', '💕', '✨'];
                heart.innerHTML = types[Math.floor(Math.random() * types.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
        
        window.onload = startHearts;
    </script>
</body>
</html>
