<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمي وأبي .. أغلى ما أملك ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0010, #3a0020, #2a0018);
            color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; text-align: center; overflow-x: hidden; position: relative;
        }
        .audio-controls {
            position: fixed; top: 20px; z-index: 100; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px); padding: 8px 20px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2); display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .control-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b); border: none; color: white;
            padding: 6px 15px; font-size: 0.9rem; font-weight: bold; border-radius: 20px; cursor: pointer;
        }
        .pause-btn { background: #555; }
        .status-text { font-size: 0.85rem; color: #ffb3d1; font-style: italic; }
        
        .main-container {
            max-width: 450px; width: 100%; z-index: 10; background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px); padding: 30px 25px; border-radius: 30px;
            border: 2px solid rgba(255, 192, 203, 0.3); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); margin-top: 60px;
        }
        h1 { font-size: 2.2rem; color: #fff; text-shadow: 0 0 15px rgba(255, 65, 108, 0.7); margin-bottom: 25px; }
        .img-box { border-radius: 20px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 25px; background: #222; min-height: 250px; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: auto; display: block; }
        
        .timer-title {
            font-size: 1.1rem; color: #fff; margin-bottom: 12px; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        .timer-container {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-bottom: 25px; direction: ltr;
        }
        .timer-box {
            background: rgba(255, 65, 108, 0.2); border: 1px solid rgba(255, 154, 158, 0.4);
            padding: 8px 4px; border-radius: 12px; min-width: 60px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .timer-num {
            font-size: 1.3rem; font-weight: bold; color: #fff; text-shadow: 0 0 8px #ff416c;
        }
        .timer-label {
            font-size: 0.75rem; color: #ffb3d1; margin-top: 2px;
        }

        .text-love { font-size: 1.8rem; color: #ff9a9e; margin-bottom: 12px; font-weight: bold; }
        .desc { font-size: 1.1rem; color: #e0e0e0; line-height: 1.6; }
        .heart { position: absolute; animation: moveUp 5s linear infinite; bottom: -10%; opacity: 0.6; z-index: 1; pointer-events: none; }
        @keyframes moveUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="audio-player" src="https://raw.githubusercontent.com/MuhammedErdoğan/MomParadise/main/omy-ganna.mp3" loop preload="auto"></audio>

    <div class="audio-controls">
        <span class="status-text" id="music-status">الموسيقى جاهزة..</span>
        <button class="control-btn" onclick="manualPlay()">▶ تشغيل</button>
        <button class="control-btn pause-btn" onclick="manualPause()">⏸ إيقاف</button>
    </div>

    <div class="main-container">
        <h1>أمي وأبي أغلى ما ليا ❤️</h1>
        
        <div class="img-box">
            <!-- تم توجيه المسار بدقة لصورتك لتجنب الخطأ الموضح في الصورة 1000136330.jpg -->
            <img src="1000136325.jpg" alt="أمي وأبي الغاليين">
        </div>

        <div class="timer-title">كل ثانية وأنتم جنتي في الدنيا منذ:</div>
        <div class="timer-container">
            <div class="timer-box"><div class="timer-num" id="seconds">35</div><div class="timer-label">ثانية</div></div>
            <div class="timer-box"><div class="timer-num" id="minutes">0</div><div class="timer-label">دقيقة</div></div>
            <div class="timer-box"><div class="timer-num" id="hours">0</div><div class="timer-label">ساعة</div></div>
            <div class="timer-box"><div class="timer-num" id="days">8</div><div class="timer-label">يوم</div></div>
            <div class="timer-box"><div class="timer-num" id="months">4</div><div class="timer-label">شهر</div></div>
            <div class="timer-box"><div class="timer-num" id="years">15</div><div class="timer-label">سنة</div></div>
        </div>

        <h2 class="text-love">ربنا يخليكم ليا ❤️</h2>
        <p class="desc">لو جمعت كلمات الشكر والامتنان من كل العالم، لن توفي حقكم يا جنتي في الدنيا. حفظكم الله لي وأدام ضحكتكم تنير حياتي.</p>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const statusText = document.getElementById('music-status');
        let skipped = false;

        // طريقة تشغيل ذكية: نشغل الصوت أولاً، وعند أول استجابة فعلية نقفز للثانية 18 لتفادي حظر المتصفحات
        function safePlay() {
            audio.play().then(() => {
                statusText.innerText = "🎵 أمي جنة.. شغال";
            }).catch(err => {
                console.log("في انتظار تفاعل المستخدم");
            });
        }

        // الاستماع لحدث بدء تشغيل الصوت الفعلي للقفز الفوري
        audio.addEventListener('playing', () => {
            if (!skipped) {
                audio.currentTime = 18;
                skipped = true;
            }
        });

        function autoPlayHandler() {
            safePlay();
            document.removeEventListener('click', autoPlayHandler);
            document.removeEventListener('touchstart', autoPlayHandler);
        }

        document.addEventListener('click', autoPlayHandler);
        document.addEventListener('touchstart', autoPlayHandler);

        function manualPlay() {
            safePlay();
        }
        
        function manualPause() { 
            audio.pause(); 
            statusText.innerText = "⏸ تم الإيقاف"; 
        }

        // العداد الرقمي المطور والمبني على فارق زمني حقيقي ثابت وثواني تتحرك
        function updateTimer() {
            const now = new Date();
            
            let years = now.getFullYear() - 2011;
            let months = now.getMonth() - 1; 
            let days = now.getDate() - 8;
            let hours = now.getHours() - 15;
            let minutes = now.getMinutes() - 8;
            let seconds = now.getSeconds() - 50;
            
            if (seconds < 0) { seconds += 60; minutes--; }
            if (minutes < 0) { minutes += 60; hours--; }
            if (hours < 0) { hours += 24; days--; }
            if (days < 0) {
                const prevMonthDays = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += prevMonthDays;
                months--;
            }
            if (months < 0) { months += 12; years--; }
            
            document.getElementById('years').innerText = years;
            document.getElementById('months').innerText = months;
            document.getElementById('days').innerText = days;
            document.getElementById('hours').innerText = hours;
            document.getElementById('minutes').innerText = minutes;
            document.getElementById('seconds').innerText = seconds;
        }

        setInterval(updateTimer, 1000);
        updateTimer(); 

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                const types = ['❤️', '💖', '💕', '✨'];
                heart.innerHTML = types[Math.floor(Math.random() * types.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
        window.onload = startHearts;
    </script>
</body>
</html>
