<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أغلى ما ليا</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #151515, #3a002c);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }
        /* الشاشة الأولى */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            animation: fadeIn 2s ease-in-out;
        }
        .start-btn {
            padding: 14px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 75, 43, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 75, 43, 0.7);
        }
        /* الشاشة الثانية */
        #content-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            max-width: 90%;
            animation: zoomIn 1.2s ease-in-out forwards;
            z-index: 10;
        }
        .img-container {
            border: 5px solid #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 450px;
            width: 100%;
        }
        .img-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        h2 {
            font-size: 2.3rem;
            color: #ff4b2b;
            text-shadow: 0 0 10px rgba(255, 75, 43, 0.4);
        }
        /* تأثير القلوب المتساقطة الرومانسية */
        .heart {
            position: absolute;
            color: #ff416c;
            animation: fall linear infinite;
            top: -10%;
            opacity: 0.8;
            user-select: none;
            pointer-events: none;
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- الشاشة الأولى -->
    <div id="welcome-screen">
        <h1>أمى و أبى اغلى ما ليا ❤️</h1>
        <button class="start-btn" onclick="showContent()">Start</button>
    </div>

    <!-- الشاشة الثانية -->
    <div id="content-screen">
        <div class="img-container">
            <!-- اسم صورتك المرفوعة تم وضعه هنا مباشرة -->
            <img src="1000093292.jpg" alt="العائلة الغالية">
        </div>
        <h2>ربنا يخليكم ليا ❤️</h2>
    </div>

    <script>
        function showContent() {
            // التحول للشاشة الثانية عند الضغط على Start
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('content-screen').style.display = 'flex';
            
            // تشغيل تأثير تساقط القلوب الجميلة في الخلفية
            setInterval(createHeart, 250);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
